name: Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact_name: zakoAudioPlayer-win-x64
            compress_ext: zip
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: zakoAudioPlayer-linux-x64
            compress_ext: tar.gz
          - os: macos-latest
            rid: osx-x64
            artifact_name: zakoAudioPlayer-osx-x64
            compress_ext: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish self-contained executable
        run: |
          dotnet publish \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            --output ./publish \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=none \
            -p:DebugSymbols=false

      - name: Compress (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dest = Join-Path "${{ runner.temp }}" "${{ matrix.artifact_name }}.zip"
          Compress-Archive -Path ./publish/* -DestinationPath $dest -Force

      - name: Compress (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dest="${{ runner.temp }}/${{ matrix.artifact_name }}.tar.gz"
          cd ./publish && tar -czf "$dest" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ runner.temp }}/${{ matrix.artifact_name }}.${{ matrix.compress_ext }}
          if-no-files-found: error

  release:
    name: Create Release and Upload Assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure of downloaded files
        run: ls -R ./artifacts

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous-${{ github.run_number }}
          name: "Continuous Build #${{ github.run_number }}"
          body: |
            🚀 自动构建于 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          draft: false
          prerelease: true
          # 上传所有 zip 文件（Windows）和 tar.gz 文件（Linux/macOS）
          files: |
            ./artifacts/**/*.zip
            ./artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
